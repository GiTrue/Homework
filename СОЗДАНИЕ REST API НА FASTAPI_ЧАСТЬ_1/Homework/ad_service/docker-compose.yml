services:
  db:
    image: postgres:15-alphabet
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: