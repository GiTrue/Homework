version: '3.8'

services:
  db:
    # ИСПРАВЛЕНИЕ: исправлено имя образа на корректное
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ИСПРАВЛЕНИЕ: добавлен healthcheck для проверки готовности БД
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8000"
    env_file:
      - .env
    # ИСПРАВЛЕНИЕ: дождаться, пока БД станет полностью 'healthy'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: